name: integration-urirun-llm

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-urirun-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connector-through-urirun-and-llm-runtime:
    name: Connector -> urirun -> urirun-llm-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout urirun-connector-urivision-runtime
        uses: actions/checkout@v4
        with:
          path: urirun-connector-urivision-runtime

      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun
          path: _deps/urirun

      - name: Checkout urirun-llm-runtime
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun-llm-runtime
          path: _deps/urirun-llm-runtime

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install urirun, current connector and llm runtime from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./_deps/urirun/adapters/python"
          python -m pip install -e "./urirun-connector-urivision-runtime"
          python -m pip install -e "./_deps/urirun-llm-runtime[dev]"

      - name: Verify connector package imports
        working-directory: urirun-connector-urivision-runtime
        run: |
          python - <<'PY'
          from urirun_connector_urivision_runtime.core import urirun_bindings

          bindings = urirun_bindings()
          assert "runtime://host/doctor/query/report" in bindings["bindings"]
          print("Connector import and smoke bindings OK")
          PY

      - name: Build isolated registry
        run: |
          mkdir -p .urirun

          python - <<'PY'
          import json
          from pathlib import Path
          from urirun_connector_urivision_runtime.core import urirun_bindings

          bindings = urirun_bindings()
          out = Path(".urirun/runtime.bindings.v2.json")
          out.write_text(json.dumps(bindings, indent=2, sort_keys=True), encoding="utf-8")

          expected_routes = set(bindings.get("bindings", {}).keys())
          assert "runtime://host/doctor/query/report" in expected_routes, "safe smoke route missing"
          print("Wrote isolated bindings:", out)
          PY

          urirun compile .urirun/runtime.bindings.v2.json --out .urirun/runtime.registry.json

          test -s .urirun/runtime.registry.json

      - name: Assert registry contains current connector only
        run: |
          python - <<'PY'

          import json
          from pathlib import Path
          from urirun_connector_urivision_runtime.core import urirun_bindings

          SMOKE_ROUTE = "runtime://host/doctor/query/report"
          bindings = urirun_bindings()
          expected_routes = set(bindings.get("bindings", {}).keys())
          assert expected_routes, "connector emitted no bindings"
          assert SMOKE_ROUTE in expected_routes, "safe smoke route missing from bindings"
          text = json.dumps(bindings)

          registry = json.loads(Path(".urirun/runtime.registry.json").read_text(encoding="utf-8"))
          registry_text = json.dumps(registry)
          assert SMOKE_ROUTE in registry_text, "safe smoke route missing from registry"
          for route in expected_routes:
              assert route in registry_text, f"expected connector route missing from registry: {route}"

          def collect_route_keys(value):
              routes = set()
              if isinstance(value, dict):
                  for key, item in value.items():
                      if isinstance(key, str) and "://" in key:
                          routes.add(key)
                      routes.update(collect_route_keys(item))
              elif isinstance(value, list):
                  for item in value:
                      routes.update(collect_route_keys(item))
              return routes

          registry_routes = collect_route_keys(registry)
          unexpected = sorted(route for route in registry_routes if route not in expected_routes)
          assert not unexpected, f"registry contains route keys outside current connector bindings: {unexpected}"
          print("Registry isolation OK: registry routes match current connector bindings.")
          PY

      - name: Run route directly through urirun
        run: |
          urirun run             'runtime://host/doctor/query/report'             .urirun/runtime.registry.json             --execute             --allow 'runtime://**'             | tee run-response.json

          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          print("Smoke route through urirun run OK")
          PY

      - name: Start urirun node
        run: |
          nohup urirun node serve             --execute             --host 127.0.0.1             --port 18765             --registry .urirun/runtime.registry.json             --allow 'runtime://**'             > urirun-node.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/health; then
              echo "urirun node is healthy"
              break
            fi
            sleep 2
          done

          curl -sf http://127.0.0.1:18765/health
          curl -sf http://127.0.0.1:18765/routes | tee routes.json
          grep -q 'runtime://host/doctor/query/report' routes.json

      - name: POST /run smoke test
        run: |
          curl -sf -X POST http://127.0.0.1:18765/run             -H 'Content-Type: application/json'             -d '{"uri":"runtime://host/doctor/query/report","mode":"execute","payload":{}}'             | tee node-run-response.json

          python - <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("node-run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          print("/run smoke route OK")
          PY

      - name: LLM runtime Executor smoke test
        working-directory: urirun-connector-urivision-runtime
        env:
          URIRUN_NODE_URL: http://127.0.0.1:18765
        run: |
          python scripts/ci_urirun_llm_smoke.py

      - name: Dump urirun node log on failure
        if: failure()
        run: |
          echo "===== urirun-node.log ====="
          cat urirun-node.log || true
